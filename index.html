<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Elina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
font-family:'Inter',sans-serif;
color:white;
}

/* BACKGROUND */

.background{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
#f4dbe4 0%,
#e6cfe5 30%,
#c9c2eb 65%,
#a9c7e8 100%
);

overflow:hidden;
}

/* SOFT LIGHTS */

.glow1{
position:absolute;

width:600px;
height:600px;

background:rgba(255,255,255,0.22);

border-radius:999px;

filter:blur(120px);

top:-150px;
left:-100px;
}

.glow2{
position:absolute;

width:500px;
height:500px;

background:rgba(255,220,240,0.25);

border-radius:999px;

filter:blur(120px);

bottom:-150px;
right:-100px;
}

/* STARS */

.star{
position:absolute;

width:4px;
height:4px;

background:white;

border-radius:999px;

opacity:0.5;

animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

/* MAIN SCREEN */

.screen{
position:relative;

z-index:10;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

padding:20px;
}

/* CONTENT */

.content{
max-width:1000px;

animation:fadeUp 2s ease forwards;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0px);
}
}

/* TITLE */

h1{
font-family:'Cormorant Garamond',serif;

font-size:90px;
font-weight:400;

line-height:1.1;

color:#fffafc;

text-shadow:
0 4px 30px rgba(0,0,0,0.18);
}

/* SUBTEXT */

p{
margin-top:30px;

font-size:22px;

letter-spacing:1px;

color:rgba(255,255,255,0.9);

text-shadow:
0 2px 15px rgba(0,0,0,0.15);
}

/* BUTTON */

button{
margin-top:55px;

padding:20px 55px;

border-radius:999px;

border:1px solid rgba(255,255,255,0.35);

background:rgba(255,255,255,0.18);

backdrop-filter:blur(12px);

color:white;

font-size:18px;

cursor:pointer;

transition:0.4s;

box-shadow:
0 10px 40px rgba(255,255,255,0.12);
}

button:hover{
transform:scale(1.05);

background:rgba(255,255,255,0.28);

box-shadow:
0 15px 50px rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="background">

<div class="glow1"></div>
<div class="glow2"></div>

</div>

<!-- STARS -->

<script>

for(let i=0;i<45;i++){

const star=document.createElement('div');

star.className='star';

star.style.left=Math.random()*100+'vw';

star.style.animationDuration=
(6+Math.random()*12)+'s';

star.style.opacity=Math.random()*0.8;

document.body.appendChild(star);

}

</script>

<!-- SCREEN -->

<section class="screen">

<div class="content">

<h1>
Есть вещи,<br>
которые сложно сказать напрямую.
</h1>

<p>
Поэтому я создал целый мир.
</p>

<button>
войти
</button>

</div>

</section>

</body>
</html>
