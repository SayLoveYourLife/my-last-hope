<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Elina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Inter',sans-serif;
background:#111827;
color:white;
}

/* BACKGROUND */

.background{
position:fixed;
inset:0;

background:
radial-gradient(circle at top left, rgba(255,190,120,0.10), transparent 25%),
radial-gradient(circle at bottom right, rgba(120,160,255,0.14), transparent 35%),
linear-gradient(
180deg,
#141c2b 0%,
#1b2740 50%,
#243454 100%
);

overflow:hidden;
}

/* GLOW */

.glow1,
.glow2{
position:absolute;
border-radius:999px;
filter:blur(140px);
}

.glow1{
width:400px;
height:400px;

background:rgba(255,190,120,0.08);

top:-100px;
left:-100px;
}

.glow2{
width:400px;
height:400px;

background:rgba(120,160,255,0.10);

bottom:-100px;
right:-100px;
}

/* STARS */

.star{
position:absolute;

width:2px;
height:2px;

background:white;

border-radius:999px;

opacity:0.5;

animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

/* SCREEN */

.screen{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

transition:1s;
}

/* CONTENT */

.content{
width:100%;
max-width:900px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;

padding:40px;
}

/* TITLES */

.mainTitle{
font-family:'Cormorant Garamond',serif;

font-size:84px;
font-weight:400;

line-height:1.1;

color:#f8f4ef;

margin-bottom:20px;

text-shadow:
0 5px 30px rgba(0,0,0,0.35);
}

.secondTitle{
font-family:'Cormorant Garamond',serif;

font-size:58px;
font-weight:400;

line-height:1.2;

margin-bottom:25px;

color:#f8f4ef;
}

/* TEXT */

.text{
font-size:20px;

line-height:1.8;

color:rgba(255,255,255,0.72);

max-width:650px;
}

/* BUTTON */

button{
margin-top:40px;

padding:18px 50px;

border:none;

border-radius:999px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

color:white;

font-size:17px;

cursor:pointer;

transition:0.3s;

border:1px solid rgba(255,255,255,0.12);
}

button:hover{
transform:scale(1.05);

background:rgba(255,255,255,0.14);
}

/* INPUT */

input{
width:340px;

margin-top:35px;

padding:18px;

border:none;

outline:none;

border-radius:18px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(10px);

color:white;

font-size:17px;

text-align:center;

border:1px solid rgba(255,255,255,0.12);
}

input::placeholder{
color:rgba(255,255,255,0.4);
}

/* FILM */

#filmReveal{
margin-top:45px;

opacity:0;

transition:1.5s;
}

.filmTitle{
font-family:'Cormorant Garamond',serif;

font-size:50px;

margin-bottom:18px;

color:#ffe3ba;
}

.quote{
font-size:20px;

line-height:1.7;

margin-bottom:30px;

color:rgba(255,255,255,0.85);
}

/* VIDEO */

iframe{
width:720px;
height:405px;

border:none;

border-radius:24px;

box-shadow:
0 20px 50px rgba(0,0,0,0.35);
}

/* HIDDEN */

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="background">

<div class="glow1"></div>
<div class="glow2"></div>

</div>

<script>

for(let i=0;i<35;i++){

const star=document.createElement('div');

star.className='star';

star.style.left=Math.random()*100+'vw';

star.style.animationDuration=
(8+Math.random()*10)+'s';

star.style.opacity=Math.random()*0.7;

document.body.appendChild(star);

}

</script>

<!-- SCREEN 1 -->

<section class="screen" id="mainScreen">

<div class="content">

<div class="mainTitle">
Есть вещи,<br>
которые сложно сказать напрямую.
</div>

<div class="text">
Поэтому я создал целый мир.
</div>

<button onclick="openPassword()">
войти
</button>

</div>

</section>

<!-- SCREEN 2 -->

<section class="screen hidden" id="passwordScreen">

<div class="content">

<div class="text" style="font-size:28px; line-height:2;">
Ты всегда знаешь к кому<br>
обратиться за помощью.
</div>

<input
type="text"
id="passwordInput"
placeholder="Введите пароль"
/>

<button onclick="checkPassword()">
открыть
</button>

<div id="filmReveal">

<div class="filmTitle">
Before Sunrise
</div>

<div class="quote">
“Isn't everything we do in life<br>
a way to be loved a little more?”
</div>

<iframe
src="https://www.youtube.com/embed/6MUcuqbGTxc"
allowfullscreen>
</iframe>

</div>

</div>

</section>

<script>

function openPassword(){

document
.getElementById('mainScreen')
.classList.add('hidden');

document
.getElementById('passwordScreen')
.classList.remove('hidden');

}

function checkPassword(){

const password =
document.getElementById('passwordInput').value;

if(password === '01:16:42'){

document
.getElementById('filmReveal')
.style.opacity='1';

}

else{

alert('Нет... это воспоминание не отсюда.');

}

}

</script>

</body>
</html>
