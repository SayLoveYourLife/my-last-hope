<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Elina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
font-family:'Inter',sans-serif;
color:white;
background:black;
}

/* BACKGROUND */

.background{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
#f4dbe4 0%,
#e6cfe5 30%,
#c9c2eb 65%,
#a9c7e8 100%
);

overflow:hidden;
}

/* LIGHT */

.glow1{
position:absolute;

width:600px;
height:600px;

background:rgba(255,255,255,0.22);

border-radius:999px;

filter:blur(120px);

top:-150px;
left:-100px;
}

.glow2{
position:absolute;

width:500px;
height:500px;

background:rgba(255,220,240,0.25);

border-radius:999px;

filter:blur(120px);

bottom:-150px;
right:-100px;
}

/* PARTICLES */

.star{
position:absolute;

width:4px;
height:4px;

background:white;

border-radius:999px;

opacity:0.5;

animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

/* SCREEN */

.screen{
position:absolute;

inset:0;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

padding:20px;

transition:1.2s;
}

/* CONTENT */

.content{
max-width:1100px;

animation:fadeUp 2s ease forwards;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0px);
}
}

/* TITLE */

h1{
font-family:'Cormorant Garamond',serif;

font-size:90px;
font-weight:400;

line-height:1.1;

color:#fffafc;

text-shadow:
0 4px 30px rgba(0,0,0,0.18);
}

/* TEXT */

p{
margin-top:30px;

font-size:22px;

letter-spacing:1px;

color:rgba(255,255,255,0.9);

text-shadow:
0 2px 15px rgba(0,0,0,0.15);
}

/* BUTTON */

button{
margin-top:55px;

padding:20px 55px;

border-radius:999px;

border:1px solid rgba(255,255,255,0.35);

background:rgba(255,255,255,0.18);

backdrop-filter:blur(12px);

color:white;

font-size:18px;

cursor:pointer;

transition:0.4s;
}

button:hover{
transform:scale(1.05);

background:rgba(255,255,255,0.28);
}

/* PASSWORD */

.passwordBox{
margin-top:40px;
}

input{
width:340px;

padding:18px;

border:none;

border-radius:20px;

background:rgba(255,255,255,0.18);

backdrop-filter:blur(10px);

outline:none;

color:white;

font-size:18px;

text-align:center;
}

input::placeholder{
color:rgba(255,255,255,0.6);
}

/* FILM */

#filmReveal{
margin-top:40px;

opacity:0;

transition:2s;
}

.filmTitle{
font-size:54px;

font-family:'Cormorant Garamond',serif;

margin-bottom:20px;
}

.quote{
font-size:22px;

line-height:1.6;

opacity:0.9;

margin-bottom:35px;
}

/* VIDEO */

.videoBox{
display:flex;
justify-content:center;
}

iframe{
width:800px;
height:450px;

border:none;

border-radius:30px;

box-shadow:
0 20px 60px rgba(0,0,0,0.25);
}

/* HIDDEN */

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="background">

<div class="glow1"></div>
<div class="glow2"></div>

</div>

<!-- PARTICLES -->

<script>

for(let i=0;i<45;i++){

const star=document.createElement('div');

star.className='star';

star.style.left=Math.random()*100+'vw';

star.style.animationDuration=
(6+Math.random()*12)+'s';

star.style.opacity=Math.random()*0.8;

document.body.appendChild(star);

}

</script>

<!-- SCREEN 1 -->

<section class="screen" id="mainScreen">

<div class="content">

<h1>
Есть вещи,<br>
которые сложно сказать напрямую.
</h1>

<p>
Поэтому я создал целый мир.
</p>

<button onclick="openPassword()">
войти
</button>

</div>

</section>

<!-- SCREEN 2 -->

<section class="screen hidden" id="passwordScreen">

<div class="content">

<h1 style="font-size:70px;">
Спроси пароль<br>
у “того самого”.
</h1>

<div class="passwordBox">

<input
type="text"
id="passwordInput"
placeholder="Введите пароль"
/>

</div>

<button onclick="checkPassword()">
открыть
</button>

<div id="filmReveal">

<div class="filmTitle">
Before Sunrise
</div>

<div class="quote">
“Isn't everything we do in life
a way to be loved a little more?”
</div>

<div class="videoBox">

<iframe
src="https://www.youtube.com/embed/6MUcuqbGTxc"
title="Before Sunrise"
allowfullscreen>
</iframe>

</div>

</div>

</div>

</section>

<!-- SCRIPT -->

<script>

function openPassword(){

document
.getElementById('mainScreen')
.classList.add('hidden');

document
.getElementById('passwordScreen')
.classList.remove('hidden');

}

function checkPassword(){

const password =
document.getElementById('passwordInput').value;

if(password === '01:16:42'){

document
.getElementById('filmReveal')
.style.opacity='1';

}

else{

alert('Нет... это воспоминание не отсюда.');

}

}

</script>

</body>
</html>
