<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>For Elina</title>

  <style>
    body{
      margin:0;
      height:100vh;
      overflow:hidden;

      background:black;
      color:white;

      display:flex;
      justify-content:center;
      align-items:center;

      font-family:Arial;
    }

    .screen{
      text-align:center;
    }

    h1{
      font-size:70px;
      font-weight:200;
    }

    p{
      opacity:0.7;
      margin-top:20px;
      font-size:20px;
    }

    button{
      margin-top:40px;

      padding:18px 40px;

      background:transparent;
      color:white;

      border:1px solid rgba(255,255,255,0.3);

      border-radius:50px;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      background:white;
      color:black;
    }

  </style>
</head>
<body>

  <div class="screen">

    <h1>
      Есть вещи,<br>
      которые сложно сказать напрямую.
    </h1>

    <p>
      Поэтому я создал целый мир.
    </p>

    <button>
      войти
    </button>

  </div>

</body>
</html>
