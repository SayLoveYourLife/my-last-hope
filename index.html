<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Elina</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: black;
      color: white;
      font-family: 'Inter', sans-serif;
      height: 100vh;
    }

    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: 1.5s ease;
    }

    .background {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(255,120,200,0.12), transparent 40%),
        radial-gradient(circle at bottom, rgba(120,120,255,0.12), transparent 40%),
        black;
      overflow: hidden;
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(white 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.18;
      animation: drift 30s linear infinite;
    }
</html>
