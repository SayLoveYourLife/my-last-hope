<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Elina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Inter',sans-serif;
background:black;
color:white;
}

/* BACKGROUND */

.background{
position:fixed;
inset:0;

background:
linear-gradient(
180deg,
#f4dbe4 0%,
#e4cfea 40%,
#c9c2eb 70%,
#a8c7e8 100%
);

overflow:hidden;
}

/* GLOW */

.glow1,
.glow2{
position:absolute;
border-radius:999px;
filter:blur(120px);
}

.glow1{
width:500px;
height:500px;

background:rgba(255,255,255,0.2);

top:-100px;
left:-100px;
}

.glow2{
width:450px;
height:450px;

background:rgba(255,220,240,0.22);

bottom:-100px;
right:-100px;
}

/* PARTICLES */

.star{
position:absolute;

width:4px;
height:4px;

background:white;

border-radius:999px;

opacity:0.4;

animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

/* SCREEN */

.screen{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

padding:40px;

transition:1s;
}

/* CONTENT */

.content{
width:100%;
max-width:950px;

text-align:center;

animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* TITLES */

.mainTitle{
font-family:'Cormorant Garamond',serif;

font-size:82px;
font-weight:400;

line-height:1.1;

color:white;

text-shadow:
0 5px 30px rgba(0,0,0,0.15);
}

.secondTitle{
font-family:'Cormorant Garamond',serif;

font-size:56px;
font-weight:400;

line-height:1.2;
}

/* TEXT */

.text{
margin-top:25px;

font-size:21px;

color:rgba(255,255,255,0.9);

line-height:1.6;
}

/* BUTTON */

button{
margin-top:45px;

padding:18px 48px;

border:none;

border-radius:999px;

background:rgba(255,255,255,0.2);

backdrop-filter:blur(10px);

color:white;

font-size:17px;

cursor:pointer;

transition:0.35s;
}

button:hover{
transform:scale(1.05);

background:rgba(255,255,255,0.32);
}

/* INPUT */

.passwordBox{
margin-top:35px;
}

input{
width:320px;

padding:18px;

border:none;

outline:none;

border-radius:18px;

background:rgba(255,255,255,0.16);

backdrop-filter:blur(10px);

color:white;

font-size:17px;

text-align:center;
}

input::placeholder{
color:rgba(255,255,255,0.6);
}

/* FILM */

#filmReveal{
margin-top:45px;

opacity:0;

transition:1.5s;
}

.filmTitle{
font-family:'Cormorant Garamond',serif;

font-size:48px;

margin-bottom:20px;
}

.quote{
font-size:20px;

line-height:1.7;

margin-bottom:35px;

color:rgba(255,255,255,0.92);
}

/* VIDEO */

.videoBox{
display:flex;
justify-content:center;
}

iframe{
width:720px;
height:405px;

border:none;

border-radius:28px;

box-shadow:
0 25px 60px rgba(0,0,0,0.2);
}

/* HIDDEN */

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.03);
}

</style>
</head>

<body>

<div class="background">

<div class="glow1"></div>
<div class="glow2"></div>

</div>

<script>

for(let i=0;i<40;i++){

const star=document.createElement('div');

star.className='star';

star.style.left=Math.random()*100+'vw';

star.style.animationDuration=
(7+Math.random()*10)+'s';

star.style.opacity=Math.random()*0.7;

document.body.appendChild(star);

}

</script>

<!-- SCREEN 1 -->

<section class="screen" id="mainScreen">

<div class="content">

<div class="mainTitle">
Есть вещи,<br>
которые сложно сказать напрямую.
</div>

<div class="text">
Поэтому я создал целый мир.
</div>

<button onclick="openPassword()">
войти
</button>

</div>

</section>

<!-- SCREEN 2 -->

<section class="screen hidden" id="passwordScreen">

<div class="content">

<div class="secondTitle">
Спроси пароль<br>
у “того самого”.
</div>

<div class="text">
Иногда ключ к чему-то важному<br>
находится не здесь.
</div>

<div class="passwordBox">

<input
type="text"
id="passwordInput"
placeholder="Введите пароль"
/>

</div>

<button onclick="checkPassword()">
открыть
</button>

<div id="filmReveal">

<div class="filmTitle">
Before Sunrise
</div>

<div class="quote">
“Isn't everything we do in life<br>
a way to be loved a little more?”
</div>

<div class="videoBox">

<iframe
src="https://www.youtube.com/embed/6MUcuqbGTxc"
allowfullscreen>
</iframe>

</div>

</div>

</div>

</section>

<script>

function openPassword(){

document
.getElementById('mainScreen')
.classList.add('hidden');

document
.getElementById('passwordScreen')
.classList.remove('hidden');

}

function checkPassword(){

const password =
document.getElementById('passwordInput').value;

if(password === '01:16:42'){

document
.getElementById('filmReveal')
.style.opacity='1';

}

else{

alert('Нет... это воспоминание не отсюда.');

}

}

</script>

</body>
</html>
