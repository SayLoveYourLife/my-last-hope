<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Elina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
overflow-x:hidden;
overflow-y:auto;

background:#0f172a;

font-family:'Inter',sans-serif;
color:white;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-track{
background:#111827;
}

::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.15);
border-radius:999px;
}

/* BACKGROUND */

.background{
position:fixed;
inset:0;

background:
radial-gradient(circle at top left,
rgba(255,180,120,0.12),
transparent 25%),

radial-gradient(circle at bottom right,
rgba(120,160,255,0.14),
transparent 35%),

linear-gradient(
180deg,
#111827 0%,
#172033 50%,
#1f2b45 100%
);

z-index:-2;
}

/* LIGHT */

.light1,
.light2{
position:absolute;
border-radius:999px;
filter:blur(120px);
}

.light1{
width:350px;
height:350px;

background:rgba(255,190,120,0.08);

top:-100px;
left:-100px;
}

.light2{
width:350px;
height:350px;

background:rgba(120,160,255,0.10);

bottom:-100px;
right:-100px;
}

/* STARS */

.star{
position:fixed;

width:2px;
height:2px;

background:white;

border-radius:999px;

opacity:0.5;

animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

/* SCREEN */

.screen{
width:100%;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:60px 20px;
}

/* CONTENT */

.content{
width:100%;
max-width:950px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;
}

/* TITLES */

.main-title{
font-family:'Cormorant Garamond',serif;

font-size:82px;
font-weight:500;

line-height:1.1;

margin-bottom:25px;

color:#f8fafc;

text-shadow:
0 5px 30px rgba(0,0,0,0.35);
}

.password-title{
font-family:'Cormorant Garamond',serif;

font-size:58px;
font-weight:500;

line-height:1.2;

margin-bottom:25px;

color:#f8fafc;
}

/* TEXT */

.text{
font-size:22px;

line-height:1.8;

color:rgba(255,255,255,0.72);

max-width:650px;
}

/* BUTTON */

button{
margin-top:45px;

padding:18px 52px;

border:none;

border-radius:999px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.12);

color:white;

font-size:17px;

cursor:pointer;

transition:0.3s;
}

button:hover{
transform:scale(1.05);

background:rgba(255,255,255,0.14);
}

/* INPUT */

input{
width:360px;

margin-top:35px;

padding:18px;

border:none;
outline:none;

border-radius:18px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.12);

color:white;

font-size:17px;

text-align:center;
}

input::placeholder{
color:rgba(255,255,255,0.45);
}

/* FILM REVEAL */

#filmReveal{
display:none;

margin-top:60px;

padding-bottom:120px;

animation:fade 1.5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.film-title{
font-family:'Cormorant Garamond',serif;

font-size:50px;

margin-bottom:18px;

color:#ffe4b5;
}

.quote{
font-size:21px;

line-height:1.8;

color:rgba(255,255,255,0.88);

margin-bottom:35px;
}

/* VIDEO */

iframe{
width:900px;
height:500px;

max-width:100%;

border:none;

border-radius:24px;

box-shadow:
0 20px 50px rgba(0,0,0,0.35);
}

/* HIDDEN */

.hidden{
display:none;
}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="background">

<div class="light1"></div>
<div class="light2"></div>

</div>

<!-- STARS -->

<script>

for(let i=0;i<35;i++){

const star=document.createElement('div');

star.className='star';

star.style.left=Math.random()*100+'vw';

star.style.animationDuration=
(8+Math.random()*10)+'s';

star.style.opacity=Math.random()*0.7;

document.body.appendChild(star);

}

</script>

<!-- FIRST SCREEN -->

<section class="screen" id="mainScreen">

<div class="content">

<div class="main-title">
Есть вещи,<br>
которые сложно сказать напрямую.
</div>

<div class="text">
Поэтому я создал целый мир.
</div>

<button onclick="openPassword()">
войти
</button>

</div>

</section>

<!-- SECOND SCREEN -->

<section class="screen hidden" id="passwordScreen">

<div class="content">

<div class="password-title">
Спроси пароль<br>
у “того самого”.
</div>

<div class="text">
Ты всегда знаешь к кому<br>
обратиться за помощью.
</div>

<input
type="text"
id="passwordInput"
placeholder="Введите пароль"
/>

<button onclick="checkPassword()">
открыть
</button>

<div id="filmReveal">

<div class="film-title">
Before Sunrise
</div>

<div class="quote">
“Isn't everything we do in life<br>
a way to be loved a little more?”
</div>

<iframe
src="https://www.youtube.com/embed/6MUcuqbGTxc"
allowfullscreen>
</iframe>

</div>

</div>

</section>

<script>

function openPassword(){

document.getElementById('mainScreen').style.display='none';

document.getElementById('passwordScreen').classList.remove('hidden');

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function checkPassword(){

const password =
document.getElementById('passwordInput').value;

if(password === '01:16:42'){

document.getElementById('filmReveal').style.display='block';

setTimeout(()=>{

document.getElementById('filmReveal')
.scrollIntoView({
behavior:'smooth'
});

},200);

}else{

alert('Нет... это воспоминание не отсюда.');

}

}

</script>

</body>
</html>
