<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Elina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
font-family:'Inter',sans-serif;
color:white;
}

/* BACKGROUND */

.background{
position:absolute;
inset:0;

background:
linear-gradient(
180deg,
#ffd6e7 0%,
#ffc2d1 25%,
#ffb3c6 45%,
#d9c2ff 75%,
#bde0fe 100%
);

overflow:hidden;
}

/* GLOW */

.glow1{
position:absolute;

width:700px;
height:700px;

background:rgba(255,255,255,0.35);

filter:blur(120px);

border-radius:999px;

top:-200px;
left:-100px;
}

.glow2{
position:absolute;

width:600px;
height:600px;

background:rgba(255,200,230,0.4);

filter:blur(120px);

border-radius:999px;

bottom:-200px;
right:-100px;
}

/* CLOUDS */

.cloud{
position:absolute;

background:rgba(255,255,255,0.18);

border-radius:999px;

filter:blur(20px);

animation:floatClouds linear infinite;
}

@keyframes floatClouds{
from{
transform:translateX(-200px);
}
to{
transform:translateX(120vw);
}
}

/* SCREEN */

.screen{
position:relative;
z-index:10;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

text-align:center;
}

/* CONTENT */

.content{
max-width:1000px;

animation:fadeUp 2s ease forwards;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0px);
}
}

/* TITLE */

h1{
font-family:'Cormorant Garamond',serif;

font-size:95px;
font-weight:400;

line-height:1.1;

color:white;

text-shadow:
0 0 30px rgba(255,255,255,0.3);
}

/* TEXT */

p{
margin-top:25px;

font-size:22px;

opacity:0.8;

letter-spacing:2px;
}

/* BUTTON */

button{
margin-top:60px;

padding:20px 55px;

border:none;

border-radius:999px;

background:rgba(255,255,255,0.25);

backdrop-filter:blur(12px);

color:white;

font-size:18px;

cursor:pointer;

transition:0.4s;

box-shadow:
0 10px 40px rgba(255,255,255,0.15);
}

button:hover{
transform:scale(1.06);

background:rgba(255,255,255,0.4);
}

/* PARTICLES */

.particle{
position:absolute;

width:6px;
height:6px;

background:white;

border-radius:999px;

opacity:0.4;

animation:particles linear infinite;
}

@keyframes particles{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-100px);
}
}

</style>
</head>

<body>

<div class="background">

<div class="glow1"></div>
<div class="glow2"></div>

</div>

<!-- CLOUDS -->

<script>

for(let i=0;i<8;i++){

const cloud=document.createElement('div');

cloud.className='cloud';

cloud.style.width=(200+Math.random()*300)+'px';
cloud.style.height=(60+Math.random()*80)+'px';

cloud.style.top=Math.random()*100+'vh';

cloud.style.animationDuration=
(40+Math.random()*30)+'s';

cloud.style.opacity=Math.random()*0.3;

document.body.appendChild(cloud);

}

</script>

<!-- PARTICLES -->

<script>

for(let i=0;i<40;i++){

const particle=document.createElement('div');

particle.className='particle';

particle.style.left=Math.random()*100+'vw';

particle.style.animationDuration=
(6+Math.random()*10)+'s';

particle.style.opacity=Math.random();

document.body.appendChild(particle);

}

</script>

<!-- SCREEN -->

<section class="screen">

<div class="content">

<h1>
Есть вещи,<br>
которые сложно сказать напрямую.
</h1>

<p>
Поэтому я создал целый мир.
</p>

<button>
войти
</button>

</div>

</section>

</body>
</html>
